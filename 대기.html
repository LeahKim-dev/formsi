<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">MSI 2026</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --muted: #888899;
    --accent: #3a7aff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
  }

  /* TOP BAR */
  .top-bar {
    width: 100%;
    max-width: 860px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .event-pill {
    font-size: 20px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 6px 16px;
  }
  .real-clock {
    font-size: 22px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
  }
  #realtime { color: var(--text); font-weight: 500; }

  /* MAIN CARD */
  .main-card {
    width: 100%;
    max-width: 860px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    overflow: hidden;
  }

  /* MATCH HEADER */
  .match-header {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 3rem 3rem;
    gap: 2rem;
    border-bottom: 1px solid var(--border);
  }

  .team { display: flex; flex-direction: column; align-items: center; gap: 14px; }

  /* 팀 배지 공통 */
  .team-badge {
    width: 96px; height: 96px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .team-badge img {
    width: 100%; height: 100%;
    object-fit: contain;
  }
  /* 흰 배경 svg(kc)용 꽉 차게 깎는 처리 */
  .team-badge.has-bg img {
    object-fit: contain; 
    padding: 8px;
  }

  .team-name { font-size: 30px; font-weight: 600; }
  .team-region { font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

  .score-btn-group { display: flex; gap: 8px; margin-top: 6px; }
  .btn-score {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    color: var(--text);
    font-size: 22px;
    width: 44px; height: 44px;
    cursor: pointer;
    transition: background 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-score:hover { background: rgba(255,255,255,0.14); }
  .btn-score:active { transform: scale(0.93); }

  /* SCORE CENTER */
  .score-center { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .series-score { display: flex; align-items: center; gap: 14px; }
  .series-num {
    font-size: 80px; font-weight: 700; line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.03em;
    transition: transform 0.15s ease;
  }
  .series-num.pop { animation: popAnim 0.35s ease; }
  @keyframes popAnim {
    0% { transform: scale(1); }
    40% { transform: scale(1.35); }
    100% { transform: scale(1); }
  }
  .series-sep { font-size: 48px; color: var(--muted); font-weight: 300; }
  .series-format { font-size: 14px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
  .live-badge {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: #ff4d4d;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #ff4d4d;
    animation: blink 1.4s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* TIMER SECTION */
  .timer-section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    border-bottom: 1px solid var(--border);
    background: var(--border);
  }
  .timer-box {
    background: var(--surface);
    padding: 2rem 2.5rem;
    display: flex; flex-direction: column; gap: 10px;
  }
  .box-label {
    font-size: 20px; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .game-time-display {
    font-size: 64px; font-weight: 600;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    color: var(--accent); line-height: 1;
  }
  .game-num-display {
    font-size: 64px; font-weight: 600;
    letter-spacing: -0.02em; line-height: 1;
  }
  .game-num-sub { font-size: 22px; color: var(--muted); }

  .time-adjust {
    display: flex; align-items: center; gap: 8px; margin-top: 4px;
  }
  .time-input {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    color: var(--text);
    font-size: 18px;
    font-variant-numeric: tabular-nums;
    padding: 6px 10px;
    width: 72px; text-align: center; outline: none;
  }
  .time-input:focus { border-color: var(--accent); }
  .time-sep { color: var(--muted); font-size: 20px; }
  .btn-set-time {
    background: rgba(58,122,255,0.18);
    border: 1px solid rgba(58,122,255,0.35);
    border-radius: 8px;
    color: var(--accent);
    font-size: 15px; padding: 6px 16px;
    cursor: pointer; transition: background 0.15s;
  }
  .btn-set-time:hover { background: rgba(58,122,255,0.3); }

  .timer-btns { display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
  .btn-timer {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px; color: var(--text);
    font-size: 15px; padding: 8px 18px;
    cursor: pointer; transition: background 0.15s;
  }
  .btn-timer:hover { background: rgba(255,255,255,0.12); }
  .btn-timer.primary {
    background: var(--accent); border-color: var(--accent); color: #fff;
  }
  .btn-timer.primary:hover { background: #2a6aef; }
  .btn-timer:active { transform: scale(0.96); }

  /* FOOTER */
  .footer {
    padding: 1.25rem 2.5rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .footer-note { font-size: 18px; color: var(--muted); font-weight: 500; }
  .btn-reset {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px; color: var(--muted);
    font-size: 15px; padding: 7px 16px;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-reset:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }

  /* WINNER OVERLAY */
  .winner-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 1.5rem;
  }
  .winner-overlay.show { display: flex; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .winner-text-big {
    font-size: 96px; font-weight: 700; color: #fff;
    text-shadow: 0 4px 40px rgba(0,0,0,0.8);
    letter-spacing: -0.02em;
    animation: zoomIn 0.4s ease;
  }
  @keyframes zoomIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
</style>
</head>
<body>

<div class="winner-overlay" id="winner-overlay">
  <div class="winner-text-big" id="winner-text-big"></div>
</div>

<div class="top-bar">
  <div class="event-pill">MSI 2026 · 플레이-인</div>
  <div class="real-clock">KST&nbsp;<span id="realtime">--:--:--</span></div>
</div>

<div class="main-card">
  <!-- MATCH HEADER -->
  <div class="match-header">
    <!-- 왼쪽 팀 -->
    <div class="team">
      <div class="team-badge" id="badge-left"></div>
      <div class="team-name" id="name-left">--</div>
      <div class="team-region" id="region-left">--</div>
      <div class="score-btn-group">
        <button class="btn-score" onclick="changeScore('left',-1)">−</button>
        <button class="btn-score" onclick="changeScore('left',1)">+</button>
      </div>
    </div>

    <div class="score-center">
      <div class="series-score">
        <span class="series-num" id="set-left">0</span>
        <span class="series-sep">:</span>
        <span class="series-num" id="set-right">0</span>
      </div>
      <div class="series-format">Best of 5</div>
      <div class="live-badge"><span class="live-dot"></span> Live</div>
    </div>

    <!-- 오른쪽 팀 -->
    <div class="team">
      <div class="team-badge" id="badge-right"></div>
      <div class="team-name" id="name-right">--</div>
      <div class="team-region" id="region-right">--</div>
      <div class="score-btn-group">
        <button class="btn-score" onclick="changeScore('right',-1)">−</button>
        <button class="btn-score" onclick="changeScore('right',1)">+</button>
      </div>
    </div>
  </div>

  <!-- TIMER + GAME NUM -->
  <div class="timer-section">
    <div class="timer-box">
      <div class="box-label">게임 타이머</div>
      <div class="game-time-display" id="game-timer">00:00</div>
      <div class="time-adjust">
        <input class="time-input" id="input-min" type="number" min="0" max="99" value="0">
        <span class="time-sep">:</span>
        <input class="time-input" id="input-sec" type="number" min="0" max="59" value="0">
        <button class="btn-set-time" onclick="setManualTime()">설정</button>
      </div>
      <div class="timer-btns">
        <button class="btn-timer primary" id="btn-start" onclick="startTimer()">▶ 시작</button>
        <button class="btn-timer" onclick="pauseTimer()">⏸ 정지</button>
        <button class="btn-timer" onclick="resetTimer()">↺ 초기화</button>
      </div>
    </div>
    <div class="timer-box">
      <div class="box-label">현재 게임</div>
      <div class="game-num-display" id="game-num">1</div>
      <div class="game-num-sub">Game <span id="game-num-sub">1</span> of 5</div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-note" id="winner-text"></div>
    <button class="btn-reset" onclick="resetAll()">전체 초기화</button>
  </div>
</div>

<script>
  // ==========================================
  // ⭐ [여기를 변경하세요] 오늘의 경기 팀 설정 변수 ⭐
  // 사용 가능한 키: 'kc', 'tlaw', 't1', 'dcg'
  // ==========================================
  const teamLeft = 'tlaw';
  const teamRight = 'dcg';
  
  // ==========================================
  // 데이터 마스터 사전 (팀 정보 통합 관리)
  // ==========================================
  const dbTeams = {
      kc: {
        name: "KC",
        region: "LEC · Europe",
        logoUrl: "https://raw.githubusercontent.com/LeahKim-dev/formsi/main/kc_logo.svg", 
        hasBg: true, 
        color: "#00A3E0", 
        bgStyle: "#ffffff",
        shadow: "rgba(0,163,224,0.35)",
        confetti: ['#00A3E0','#ffffff','#0A162B']
      },
      dcg: {
        name: "DCG",
        region: "LCP · PCS",
        logoUrl: "https://raw.githubusercontent.com/LeahKim-dev/formsi/main/dcg_logo.webp", 
        hasBg: true,
        color: "#3a7aff", 
        bgStyle: "#ffffff",
        shadow: "rgba(58,122,255,0.25)",
        confetti: ['#3a7aff','#ffffff','#111116']
      },
      tlaw: {
        name: "TLAW",
        region: "LCS · Americas",
        logoUrl: "https://raw.githubusercontent.com/LeahKim-dev/formsi/main/tlaw_logo.webp", 
        hasBg: true,
        color: "#1d2d50", 
        bgStyle: "#ffffff",
        shadow: "rgba(29,45,80,0.3)",
        confetti: ['#1d2d50','#C9A84C','#ffffff']
      },
      t1: {
        name: "T1",
        region: "LCK · Korea",
        logoUrl: "https://raw.githubusercontent.com/LeahKim-dev/formsi/main/t1_logo.svg", 
        hasBg: true,
        color: "#C8102E", 
        bgStyle: "#ffffff",
        shadow: "rgba(200,16,46,0.4)",
        confetti: ['#C8102E','#ffffff','#ff6b6b']
      }
    };

  // 실시간 점수 관리 변수
  let scoreLeft = 0, scoreRight = 0;
  let timerSec = 0, timerRunning = false, timerInterval = null;

// 화면 초기 세팅 빌더 함수 (이 내부도 logoUrl을 바로 가져오도록 수정되었습니다)
  function initLayout() {
    const leftData = dbTeams[teamLeft];
    const rightData = dbTeams[teamRight];

    if(!leftData || !rightData) return alert("팀 설정 매칭 변수 오류!");

    // 브라우저 타이틀 설정
    document.getElementById('page-title').textContent = `${leftData.name} vs ${rightData.name} — MSI 2026`;

    // 왼쪽 팀 렌더링
    document.getElementById('name-left').textContent = leftData.name;
    document.getElementById('region-left').textContent = leftData.region;
    const bLeft = document.getElementById('badge-left');
    bLeft.style.background = leftData.bgStyle;
    bLeft.style.border = `4px solid ${leftData.color}`;
    bLeft.style.boxShadow = `0 0 50px ${leftData.shadow}`;
    bLeft.innerHTML = `<img src="${leftData.logoUrl}" alt="${leftData.name}">`; // 주소 다이렉트 바인딩
    if(leftData.hasBg) bLeft.classList.add('has-bg');

    // 오른쪽 팀 렌더링
    document.getElementById('name-right').textContent = rightData.name;
    document.getElementById('region-right').textContent = rightData.region;
    const bRight = document.getElementById('badge-right');
    bRight.style.background = rightData.bgStyle;
    bRight.style.border = `4px solid ${rightData.color}`;
    bRight.style.boxShadow = `0 0 50px ${rightData.shadow}`;
    bRight.innerHTML = `<img src="${rightData.logoUrl}" alt="${rightData.name}">`; // 주소 다이렉트 바인딩
    if(rightData.hasBg) bRight.classList.add('has-bg');
  }

  // 실행 호출
  initLayout();

  // 자릿수 보정 유틸
  function pad(n) { return String(n).padStart(2,'0'); }

  // 상단 실제 클록 시계 고정
  function tick() {
    const now = new Date();
    document.getElementById('realtime').textContent =
      pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
  }
  tick(); setInterval(tick, 1000);

  // 게임 타이머 디스플레이 인터페이스 업데이트
  function updateTimerDisplay() {
    document.getElementById('game-timer').textContent =
      pad(Math.floor(timerSec/60))+':'+pad(timerSec%60);
  }
  function startTimer() {
    if (timerRunning) return;
    timerRunning = true;
    document.getElementById('btn-start').textContent = '▶ 진행 중';
    timerInterval = setInterval(()=>{ timerSec++; updateTimerDisplay(); }, 1000);
  }
  function pauseTimer() {
    if (!timerRunning) return;
    timerRunning = false;
    clearInterval(timerInterval);
    document.getElementById('btn-start').textContent = '▶ 재개';
  }
  function resetTimer() {
    pauseTimer(); timerSec = 0; updateTimerDisplay();
    document.getElementById('input-min').value = 0;
    document.getElementById('input-sec').value = 0;
    document.getElementById('btn-start').textContent = '▶ 시작';
  }
  function setManualTime() {
    const m = parseInt(document.getElementById('input-min').value)||0;
    const s = parseInt(document.getElementById('input-sec').value)||0;
    const was = timerRunning;
    pauseTimer();
    timerSec = m*60 + Math.min(s,59);
    updateTimerDisplay();
    if (was) startTimer();
  }

  // 스코어 팝 애니메이션 제어
  function popScore(id) {
    const el = document.getElementById(id);
    el.classList.remove('pop');
    void el.offsetWidth;
    el.classList.add('pop');
  }

  // 실시간 세트 증감 핸들러
  function changeScore(side, delta) {
    if (side === 'left') {
      scoreLeft = Math.max(0, Math.min(3, scoreLeft + delta));
      document.getElementById('set-left').textContent = scoreLeft;
      if (delta > 0) popScore('set-left');
    } else {
      scoreRight = Math.max(0, Math.min(3, scoreRight + delta));
      document.getElementById('set-right').textContent = scoreRight;
      if (delta > 0) popScore('set-right');
    }
    
    const nextGame = Math.min(scoreLeft + scoreRight + 1, 5);
    document.getElementById('game-num').textContent = nextGame;
    document.getElementById('game-num-sub').textContent = nextGame;
    checkWinner();
  }

  // 위너 체크 인터페이스
  function checkWinner() {
    const el = document.getElementById('winner-text');
    if (scoreLeft === 3) {
      el.textContent = `🏆 ${dbTeams[teamLeft].name} 승리!`;
      showWinner(dbTeams[teamLeft].name, dbTeams[teamLeft].confetti);
    } else if (scoreRight === 3) {
      el.textContent = `🏆 ${dbTeams[teamRight].name} 승리!`;
      showWinner(dbTeams[teamRight].name, dbTeams[teamRight].confetti);
    } else {
      el.textContent = '';
    }
  }

  // 위너 모달 오버레이 바인딩 + 폭죽 컬러 동적 할당
  function showWinner(name, colors) {
    const overlay = document.getElementById('winner-overlay');
    const txt = document.getElementById('winner-text-big');
    txt.textContent = '🏆 ' + name + ' WIN!';
    overlay.classList.add('show');

    const end = Date.now() + 10000;
    (function frame() {
      confetti({ particleCount: 6, angle: 60, spread: 55, origin:{x:0}, colors });
      confetti({ particleCount: 6, angle: 120, spread: 55, origin:{x:1}, colors });
      if (Date.now() < end) requestAnimationFrame(frame);
    })();

    setTimeout(()=>{ overlay.classList.remove('show'); }, 10500);
  }

  // 전체 초기화 (버그 수정 완비)
  function resetAll() {
    if (!confirm('전체 초기화하시겠습니까?')) return;
    scoreLeft = 0; scoreRight = 0;
    document.getElementById('set-left').textContent = 0;
    document.getElementById('set-right').textContent = 0;
    document.getElementById('game-num').textContent = 1;
    document.getElementById('game-num-sub').textContent = 1;
    document.getElementById('winner-text').textContent = '';
    resetTimer();
  }
</script>
</body>
</html>
