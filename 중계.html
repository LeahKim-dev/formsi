<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T1 vs TLAW — MSI 2026</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<style>
  :root {
    --t1-red: #C8102E;
    --tlaw-gold: #C9A84C;
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --muted: #888899;
    --accent: #3a7aff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
  }

  /* TOP BAR */
  .top-bar {
    width: 100%;
    max-width: 900px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .event-pill {
    font-size: 16px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 6px 16px;
  }
  .real-clock {
    font-size: 18px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
  }
  #realtime { color: var(--text); font-weight: 500; }

  /* MAIN CARD */
  .main-card {
    width: 100%;
    max-width: 600px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    overflow: hidden;
  }

  /* MATCH HEADER */
  .match-header {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 3rem 3rem;
    gap: 2rem;
    border-bottom: 1px solid var(--border);
  }

  .team { display: flex; flex-direction: column; align-items: center; gap: 14px; }

  .team-badge {
    width: 96px; height: 96px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 700;
  }
  .team-badge.t1 {
    background: var(--t1-red);
    color: #fff;
    box-shadow: 0 0 40px rgba(200,16,46,0.4);
  }
  .team-badge.tlaw {
    background: #0d1117;
    border: 2px solid var(--tlaw-gold);
    color: var(--tlaw-gold);
    box-shadow: 0 0 40px rgba(201,168,76,0.25);
  }
  .team-name { font-size: 30px; font-weight: 600; }
  .team-region { font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

  .score-btn-group { display: flex; gap: 8px; margin-top: 6px; }
  .btn-score {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    color: var(--text);
    font-size: 22px;
    width: 44px; height: 44px;
    cursor: pointer;
    transition: background 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-score:hover { background: rgba(255,255,255,0.14); }
  .btn-score:active { transform: scale(0.93); }

  /* SCORE CENTER */
  .score-center { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .series-score { display: flex; align-items: center; gap: 14px; }
  .series-num {
    font-size: 80px; font-weight: 700; line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.03em;
    transition: transform 0.15s ease;
  }
  .series-num.pop { animation: popAnim 0.35s ease; }
  @keyframes popAnim {
    0% { transform: scale(1); }
    40% { transform: scale(1.35); }
    100% { transform: scale(1); }
  }
  .series-sep { font-size: 48px; color: var(--muted); font-weight: 300; }
  .series-format { font-size: 14px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
  .live-badge {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: #ff4d4d;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #ff4d4d;
    animation: blink 1.4s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* TIMER SECTION */
  .timer-section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    border-bottom: 1px solid var(--border);
    background: var(--border);
  }
  .timer-box {
    background: var(--surface);
    padding: 2rem 2.5rem;
    display: flex; flex-direction: column; gap: 10px;
  }
  .box-label {
    font-size: 14px; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .game-time-display {
    font-size: 64px; font-weight: 600;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    color: var(--accent); line-height: 1;
  }
  .game-num-display {
    font-size: 64px; font-weight: 600;
    letter-spacing: -0.02em; line-height: 1;
  }
  .game-num-sub { font-size: 16px; color: var(--muted); }

  .time-adjust {
    display: flex; align-items: center; gap: 8px; margin-top: 4px;
  }
  .time-input {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    color: var(--text);
    font-size: 18px;
    font-variant-numeric: tabular-nums;
    padding: 6px 10px;
    width: 72px; text-align: center; outline: none;
  }
  .time-input:focus { border-color: var(--accent); }
  .time-sep { color: var(--muted); font-size: 20px; }
  .btn-set-time {
    background: rgba(58,122,255,0.18);
    border: 1px solid rgba(58,122,255,0.35);
    border-radius: 8px;
    color: var(--accent);
    font-size: 15px; padding: 6px 16px;
    cursor: pointer; transition: background 0.15s;
  }
  .btn-set-time:hover { background: rgba(58,122,255,0.3); }

  .timer-btns { display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
  .btn-timer {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px; color: var(--text);
    font-size: 15px; padding: 8px 18px;
    cursor: pointer; transition: background 0.15s;
  }
  .btn-timer:hover { background: rgba(255,255,255,0.12); }
  .btn-timer.primary {
    background: var(--accent); border-color: var(--accent); color: #fff;
  }
  .btn-timer.primary:hover { background: #2a6aef; }
  .btn-timer:active { transform: scale(0.96); }



  /* FOOTER */
  .footer {
    padding: 1.25rem 2.5rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .footer-note { font-size: 18px; color: var(--muted); font-weight: 500; }
  .btn-reset {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px; color: var(--muted);
    font-size: 15px; padding: 7px 16px;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-reset:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }

  /* WINNER OVERLAY */
  .winner-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 1.5rem;
  }
  .winner-overlay.show { display: flex; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .winner-img {
    width: min(480px, 80vw);
    border-radius: 20px;
    animation: zoomIn 0.4s ease;
  }
  @keyframes zoomIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .winner-text-big {
    font-size: 36px; font-weight: 700; color: #fff;
    text-shadow: 0 2px 20px rgba(0,0,0,0.6);
  }
</style>
</head>
<body>

<!-- WINNER OVERLAY -->
<div class="winner-overlay" id="winner-overlay">
  <img class="winner-img" id="winner-img" src="" alt="winner">
  <div class="winner-text-big" id="winner-text-big"></div>
</div>

<div class="top-bar">
  <div class="event-pill">MSI 2025 · Bracket Stage</div>
  <div class="real-clock">KST&nbsp;<span id="realtime">--:--:--</span></div>
</div>

<div class="main-card">

  <!-- MATCH HEADER -->
  <div class="match-header">
    <div class="team">
      <div class="team-badge t1">T1</div>
      <div class="team-name">T1</div>
      <div class="team-region">LCK · Korea</div>
      <div class="score-btn-group">
        <button class="btn-score" onclick="changeSet('t1',-1)">−</button>
        <button class="btn-score" onclick="changeSet('t1',1)">+</button>
      </div>
    </div>

    <div class="score-center">
      <div class="series-score">
        <span class="series-num" id="set-t1">0</span>
        <span class="series-sep">:</span>
        <span class="series-num" id="set-tlaw">0</span>
      </div>
      <div class="series-format">Best of 5</div>
      <div class="live-badge"><span class="live-dot"></span> Live</div>
    </div>

    <div class="team">
      <div class="team-badge tlaw">TL</div>
      <div class="team-name">TLAW</div>
      <div class="team-region">LCS · Americas</div>
      <div class="score-btn-group">
        <button class="btn-score" onclick="changeSet('tlaw',-1)">−</button>
        <button class="btn-score" onclick="changeSet('tlaw',1)">+</button>
      </div>
    </div>
  </div>

  <!-- TIMER + GAME NUM -->
  <div class="timer-section">
    <div class="timer-box">
      <div class="box-label">게임 타이머</div>
      <div class="game-time-display" id="game-timer">00:00</div>
      <div class="time-adjust">
        <input class="time-input" id="input-min" type="number" min="0" max="99" value="0">
        <span class="time-sep">:</span>
        <input class="time-input" id="input-sec" type="number" min="0" max="59" value="0">
        <button class="btn-set-time" onclick="setManualTime()">설정</button>
      </div>
      <div class="timer-btns">
        <button class="btn-timer primary" id="btn-start" onclick="startTimer()">▶ 시작</button>
        <button class="btn-timer" onclick="pauseTimer()">⏸ 정지</button>
        <button class="btn-timer" onclick="resetTimer()">↺ 초기화</button>
      </div>
    </div>
    <div class="timer-box">
      <div class="box-label">현재 게임</div>
      <div class="game-num-display" id="game-num">1</div>
      <div class="game-num-sub">Game <span id="game-num-sub">1</span> of 5</div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-note" id="winner-text"></div>
    <button class="btn-reset" onclick="resetAll()">전체 초기화</button>
  </div>
</div>

<script>
  let setT1 = 0, setTLAW = 0;
  let timerSec = 0, timerRunning = false, timerInterval = null;

  function pad(n) { return String(n).padStart(2,'0'); }

  // Real clock
  function tick() {
    const now = new Date();
    document.getElementById('realtime').textContent =
      pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
  }
  tick(); setInterval(tick, 1000);

  // Game timer
  function updateTimerDisplay() {
    document.getElementById('game-timer').textContent =
      pad(Math.floor(timerSec/60))+':'+pad(timerSec%60);
  }
  function startTimer() {
    if (timerRunning) return;
    timerRunning = true;
    document.getElementById('btn-start').textContent = '▶ 진행 중';
    timerInterval = setInterval(()=>{ timerSec++; updateTimerDisplay(); }, 1000);
  }
  function pauseTimer() {
    if (!timerRunning) return;
    timerRunning = false;
    clearInterval(timerInterval);
    document.getElementById('btn-start').textContent = '▶ 재개';
  }
  function resetTimer() {
    pauseTimer(); timerSec = 0; updateTimerDisplay();
    document.getElementById('input-min').value = 0;
    document.getElementById('input-sec').value = 0;
    document.getElementById('btn-start').textContent = '▶ 시작';
  }
  function setManualTime() {
    const m = parseInt(document.getElementById('input-min').value)||0;
    const s = parseInt(document.getElementById('input-sec').value)||0;
    const was = timerRunning;
    pauseTimer();
    timerSec = m*60 + Math.min(s,59);
    updateTimerDisplay();
    if (was) startTimer();
  }

  // Score pop animation
  function popScore(id) {
    const el = document.getElementById(id);
    el.classList.remove('pop');
    void el.offsetWidth;
    el.classList.add('pop');
  }

  // Series score
  function changeSet(team, delta) {
    if (team==='t1') setT1 = Math.max(0, Math.min(3, setT1+delta));
    else setTLAW = Math.max(0, Math.min(3, setTLAW+delta));
    document.getElementById('set-t1').textContent = setT1;
    document.getElementById('set-tlaw').textContent = setTLAW;
    if (delta > 0) popScore(team==='t1' ? 'set-t1' : 'set-tlaw');
    const g = Math.min(setT1+setTLAW+1, 5);
    document.getElementById('game-num').textContent = g;
    document.getElementById('game-num-sub').textContent = g;
    checkWinner();
  }

  // Winner
  function checkWinner() {
    const el = document.getElementById('winner-text');
    if (setT1===3) {
      el.textContent = '🏆 T1 승리!';
      showWinner('T1', 'https://upload.wikimedia.org/wikipedia/en/thumb/7/7a/T1_logo.svg/1200px-T1_logo.svg.png');
    } else if (setTLAW===3) {
      el.textContent = '🏆 TLAW 승리!';
      showWinner('TLAW', '');
    } else {
      el.textContent = '';
    }
  }

  function showWinner(name, imgUrl) {
    const overlay = document.getElementById('winner-overlay');
    const img = document.getElementById('winner-img');
    const txt = document.getElementById('winner-text-big');
    txt.textContent = '🏆 ' + name + ' 승리!';
    img.src = imgUrl;
    img.style.display = imgUrl ? 'block' : 'none';
    overlay.classList.add('show');

    // confetti
    const end = Date.now() + 4000;
    const colors = name==='T1' ? ['#C8102E','#ffffff','#ff6b6b'] : ['#C9A84C','#ffffff','#ffe08a'];
    (function frame() {
      confetti({ particleCount: 6, angle: 60, spread: 55, origin:{x:0}, colors });
      confetti({ particleCount: 6, angle: 120, spread: 55, origin:{x:1}, colors });
      if (Date.now() < end) requestAnimationFrame(frame);
    })();

    setTimeout(()=>{ overlay.classList.remove('show'); }, 4500);
  }


  // Reset all
  function resetAll() {
    if (!confirm('전체 초기화하시겠습니까?')) return;
    setT1=0; setTLAW=0; killT1=0; killTLAW=0;
    document.getElementById('set-t1').textContent=0;
    document.getElementById('set-tlaw').textContent=0;
    document.getElementById('game-num').textContent=1;
    document.getElementById('game-num-sub').textContent=1;
    document.getElementById('winner-text').textContent='';
    resetTimer();
  }
</script>
</body>
</html>
