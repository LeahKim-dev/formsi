<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">MSI 2026</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --muted: #888899;
    --accent: #3a7aff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
  }

  /* TOP BAR */
  .top-bar {
    width: 100%;
    max-width: 1060px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
  }
  .event-pill {
    font-size: 24px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 8px 22px;
  }
  .real-clock {
    font-size: 26px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
  }
  #realtime { color: var(--text); font-weight: 500; }

  /* MAIN CARD */
  .main-card {
    width: 100%;
    max-width: 1060px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 28px;
    overflow: hidden;
  }

  /* MATCH HEADER */
  .match-header {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 4rem 3.5rem;
    gap: 2.5rem;
    border-bottom: 1px solid var(--border);
  }

  .team { display: flex; flex-direction: column; align-items: center; gap: 18px; }

  .team-badge {
    width: 120px; height: 120px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .team-badge img {
    width: 100%; height: 100%;
    object-fit: contain;
  }
  .team-badge.has-bg img {
    object-fit: contain; 
    padding: 8px;
  }

  .team-name { font-size: 38px; font-weight: 700; }
  .team-region { font-size: 16px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }

  .score-btn-group { display: flex; gap: 10px; margin-top: 8px; }
  .btn-score {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    color: var(--text);
    font-size: 26px;
    width: 54px; height: 54px;
    cursor: pointer;
    transition: background 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-score:hover { background: rgba(255,255,255,0.14); }
  .btn-score:active { transform: scale(0.92); }

  /* SCORE CENTER */
  .score-center { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .series-score { display: flex; align-items: center; gap: 18px; }
  .series-num {
    font-size: 100px; font-weight: 800; line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.03em;
    transition: transform 0.15s ease;
  }
  .series-num.pop { animation: popAnim 0.35s ease; }
  @keyframes popAnim {
    0% { transform: scale(1); }
    40% { transform: scale(1.35); }
    100% { transform: scale(1); }
  }
  .series-sep { font-size: 64px; color: var(--muted); font-weight: 300; }
  .series-format { font-size: 16px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .live-badge {
    display: flex; align-items: center; gap: 8px;
    font-size: 15px; color: #ff4d4d;
    letter-spacing: 0.08em; text-transform: uppercase;
    font-weight: 600;
  }
  .live-dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: #ff4d4d;
    animation: blink 1.4s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* TIMER SECTION */
  .timer-section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    border-bottom: 1px solid var(--border);
    background: var(--border);
  }
  .timer-box {
    background: var(--surface);
    padding: 2rem 3.5rem;
    display: flex; flex-direction: column; gap: 14px;
  }
  .box-label {
    font-size: 22px; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .game-time-display {
    font-size: 82px; font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    color: var(--accent); line-height: 1;
  }
  .game-num-display {
    font-size: 82px; font-weight: 700;
    letter-spacing: -0.02em; line-height: 1;
  }
  .game-num-sub { font-size: 24px; color: var(--muted); }

  .time-adjust {
    display: flex; align-items: center; gap: 10px; margin-top: 6px;
  }
  .time-input {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    color: var(--text);
    font-size: 22px;
    font-variant-numeric: tabular-nums;
    padding: 8px 14px;
    width: 88px; text-align: center; outline: none;
  }
  .time-input:focus { border-color: var(--accent); }
  .time-sep { color: var(--muted); font-size: 24px; }
  .btn-set-time {
    background: rgba(58,122,255,0.18);
    border: 1px solid rgba(58,122,255,0.35);
    border-radius: 10px;
    color: var(--accent);
    font-size: 18px; padding: 8px 20px;
    cursor: pointer; transition: background 0.15s;
    font-weight: 500;
  }
  .btn-set-time:hover { background: rgba(58,122,255,0.3); }

  .timer-btns { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
  .btn-timer {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px; color: var(--text);
    font-size: 18px; padding: 12px 24px;
    cursor: pointer; transition: background 0.15s;
    font-weight: 500;
  }
  .btn-timer:hover { background: rgba(255,255,255,0.12); }
  .btn-timer.primary {
    background: var(--accent); border-color: var(--accent); color: #fff;
  }
  .btn-timer.primary:hover { background: #2a6aef; }
  .btn-timer:active { transform: scale(0.96); }

  /* FOOTER */
  .footer {
    padding: 1.5rem 3.5rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .footer-note { font-size: 22px; color: var(--muted); font-weight: 500; }
  .btn-reset {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px; color: var(--muted);
    font-size: 18px; padding: 10px 22px;
    cursor: pointer; transition: all 0.15s;
    font-weight: 500;
  }
  .btn-reset:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }

  /* WINNER OVERLAY */
  .winner-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 2rem;
  }
  .winner-overlay.show { display: flex; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .winner-text-big {
    font-size: 120px; font-weight: 800; color: #fff;
    text-shadow: 0 4px 50px rgba(0,0,0,0.8);
    letter-spacing: -0.02em;
    animation: zoomIn 0.4s ease;
  }
  @keyframes zoomIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
</style>
</head>
<body>

<div class="winner-overlay" id="winner-overlay">
  <div class="winner-text-big" id="winner-text-big"></div>
</div>

<div class="top-bar">
  <div class="event-pill">MSI 2026 · 플레이-인</div>
  <div class="real-clock">KST&nbsp;<span id="realtime">--:--:--</span></div>
</div>

<div class="main-card">
  <div class="match-header">
    <div class="team">
      <div class="team-badge" id="badge-left"></div>
      <div class="team-name" id="name-left">--</div>
      <div class="team-region" id="region-left">--</div>
      <div class="score-btn-group">
        <button class="btn-score" onclick="changeScore('left',-1)">−</button>
        <button class="btn-score" onclick="changeScore('left',1)">+</button>
      </div>
    </div>

    <div class="score-center">
      <div class="series-score">
        <span class="series-num" id="set-left">0</span>
        <span class="series-sep">:</span>
        <span class="series-num" id="set-right">0</span>
      </div>
      <div class="series-format">Best of 5</div>
      <div class="live-badge"><span class="live-dot"></span> Live</div>
    </div>

    <div class="team">
      <div class="team-badge" id="badge-right"></div>
      <div class="team-name" id="name-right">--</div>
      <div class="team-region" id="region-right">--</div>
      <div class="score-btn-group">
        <button class="btn-score" onclick="changeScore('right',-1)">−</button>
        <button class="btn-score" onclick="changeScore('right',1)">+</button>
      </div>
    </div>
  </div>

  <div class="timer-section">
    <div class="timer-box">
      <div class="box-label">게임 타이머</div>
      <div class="game-time-display" id="game-timer">00:00</div>
      <div class="time-adjust">
        <input class="time-input" id="input-min" type="number" min="0" max="99" value="0">
        <span class="time-sep">:</span>
        <input class="time-input" id="input-sec" type="number" min="0" max="59" value="0">
        <button class="btn-set-time" onclick="setManualTime()">설정</button>
      </div>
      <div class="timer-btns">
        <button class="btn-timer primary" id="btn-start" onclick="startTimer()">▶ 시작</button>
        <button class="btn-timer" onclick="pauseTimer()">⏸ 정지</button>
        <button class="btn-timer" onclick="resetTimer()">↺ 초기화</button>
      </div>
    </div>
    <div class="timer-box">
      <div class="box-label">현재 게임</div>
      <div class="game-num-display" id="game-num">1</div>
      <div class="game-num-sub">Game <span id="game-num-sub">1</span> of 5</div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-note" id="winner-text"></div>
    <button class="btn-reset" onclick="resetAll()">전체 초기화</button>
  </div>
</div>

<script>
  // ==========================================
  // 1. Firebase 설정 (제공해주신 Key값 연동 완료)
  // ==========================================
  const firebaseConfig = {
    apiKey: "AIzaSyAHVZlxDjVQBrhkeux7w1yK6s3R3Zq3_cM",
    authDomain: "lolesports-watchparty.firebaseapp.com",
    projectId: "lolesports-watchparty",
    storageBucket: "lolesports-watchparty.firebasestorage.app",
    messagingSenderId: "88622809180",
    appId: "1:88622809180:web:c30ed07de33efb691fa699",
    // 구글 애널리틱스 활성화 상태를 위한 ID 유지
    measurementId: "G-729RP8H0E8" 
  };

  // Firebase 및 데이터베이스 호환 구동 방식 적용
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();
  
  // 구글 애널리틱스 분석 가동
  if (typeof firebase.analytics === 'function') {
    firebase.analytics();
  }

  // ==========================================
  // 2. 오늘의 경기 팀 설정 변수
  // ==========================================
  const teamLeft = 'tlaw';
  const teamRight = 'dcg';
  
  // 데이터 마스터 사전 (기존 데이터 유지)
  const dbTeams = {
      kc: {
        name: "KC",
        region: "LEC · Europe",
        logoUrl: "https://raw.githubusercontent.com/LeahKim-dev/formsi/main/src/kc_logo.svg", 
        hasBg: true, 
        color: "#00A3E0", 
        bgStyle: "#ffffff",
        shadow: "rgba(0,163,224,0.35)",
        confetti: ['#00A3E0','#ffffff','#0A162B']
      },
      dcg: {
        name: "DCG",
        region: "LCP · PCS",
        logoUrl: "https://raw.githubusercontent.com/LeahKim-dev/formsi/main/src/dcg_logo.webp", 
        hasBg: true,
        color: "#3a7aff", 
        bgStyle: "#ffffff",
        shadow: "rgba(58,122,255,0.25)",
        confetti: ['#3a7aff','#ffffff','#111116']
      },
      tlaw: {
        name: "TLAW",
        region: "LCS · Americas",
        logoUrl: "https://raw.githubusercontent.com/LeahKim-dev/formsi/main/src/tlaw_logo.webp", 
        hasBg: true,
        color: "#1d2d50", 
        bgStyle: "#ffffff",
        shadow: "rgba(29,45,80,0.3)",
        confetti: ['#1d2d50','#C9A84C','#ffffff']
      },
      t1: {
        name: "T1",
        region: "LCK · Korea",
        logoUrl: "https://raw.githubusercontent.com/LeahKim-dev/formsi/main/src/t1_logo.svg", 
        hasBg: true,
        color: "#C8102E", 
        bgStyle: "#ffffff",
        shadow: "rgba(200,16,46,0.4)",
        confetti: ['#C8102E','#ffffff','#ff6b6b']
      }
    };

  let timerInterval = null;

  // 실시간 전역 상태 객체
  let remoteState = {
    scoreLeft: 0,
    scoreRight: 0,
    timerSec: 0,
    timerRunning: false,
    winnerTriggered: false
  };

  // 레이아웃 초기화 함수
  function initLayout() {
    const leftData = dbTeams[teamLeft];
    const rightData = dbTeams[teamRight];
    if(!leftData || !rightData) return alert("팀 설정 매칭 변수 오류!");

    document.getElementById('page-title').textContent = `${leftData.name} vs ${rightData.name} — MSI 2026`;
    document.getElementById('name-left').textContent = leftData.name;
    document.getElementById('region-left').textContent = leftData.region;
    const bLeft = document.getElementById('badge-left');
    bLeft.style.background = leftData.bgStyle;
    bLeft.style.border = `4px solid ${leftData.color}`;
    bLeft.style.boxShadow = `0 0 50px ${leftData.shadow}`;
    bLeft.innerHTML = `<img src="${leftData.logoUrl}" alt="${leftData.name}">`;
    if(leftData.hasBg) bLeft.classList.add('has-bg');

    document.getElementById('name-right').textContent = rightData.name;
    document.getElementById('region-right').textContent = rightData.region;
    const bRight = document.getElementById('badge-right');
    bRight.style.background = rightData.bgStyle;
    bRight.style.border = `4px solid ${rightData.color}`;
    bRight.style.boxShadow = `0 0 50px ${rightData.shadow}`;
    bRight.innerHTML = `<img src="${rightData.logoUrl}" alt="${rightData.name}">`;
    if(rightData.hasBg) bRight.classList.add('has-bg');
  }
  initLayout();

  function pad(n) { return String(n).padStart(2,'0'); }

  // 실제 시계 가동
  function tick() {
    const now = new Date();
    document.getElementById('realtime').textContent =
      pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
  }
  tick(); setInterval(tick, 1000);

  // Firebase 실시간 리스너 수신부
  database.ref('msi_match_state').on('value', (snapshot) => {
    const data = snapshot.val();
    if (data) {
      if (data.scoreLeft > remoteState.scoreLeft) popScore('set-left');
      if (data.scoreRight > remoteState.scoreRight) popScore('set-right');
      remoteState = data;
      updateUI();
    } else {
      saveToDB();
    }
  });

  function saveToDB() {
    database.ref('msi_match_state').set(remoteState);
  }

  function updateUI() {
    document.getElementById('set-left').textContent = remoteState.scoreLeft;
    document.getElementById('set-right').textContent = remoteState.scoreRight;

    const nextGame = Math.min(remoteState.scoreLeft + remoteState.scoreRight + 1, 5);
    document.getElementById('game-num').textContent = nextGame;
    document.getElementById('game-num-sub').textContent = nextGame;

    document.getElementById('game-timer').textContent =
      pad(Math.floor(remoteState.timerSec/60)) + ':' + pad(remoteState.timerSec%60);

    const btnStart = document.getElementById('btn-start');
    if (remoteState.timerRunning) {
      btnStart.textContent = '▶ 진행 중';
      if (!timerInterval) {
        timerInterval = setInterval(() => {
          remoteState.timerSec++;
          document.getElementById('game-timer').textContent =
            pad(Math.floor(remoteState.timerSec/60)) + ':' + pad(remoteState.timerSec%60);
        }, 1000);
      }
    } else {
      btnStart.textContent = remoteState.timerSec > 0 ? '▶ 재개' : '▶ 시작';
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }
    checkWinner();
  }

  function popScore(id) {
    const el = document.getElementById(id);
    el.classList.remove('pop');
    void el.offsetWidth;
    el.classList.add('pop');
  }

  // 조작부 버튼 이벤트 함수들
  function changeScore(side, delta) {
    if (side === 'left') {
      remoteState.scoreLeft = Math.max(0, Math.min(3, remoteState.scoreLeft + delta));
    } else {
      remoteState.scoreRight = Math.max(0, Math.min(3, remoteState.scoreRight + delta));
    }
    if (remoteState.scoreLeft < 3 && remoteState.scoreRight < 3) {
      remoteState.winnerTriggered = false;
    }
    saveToDB();
  }

  function startTimer() {
    if (remoteState.timerRunning) return;
    remoteState.timerRunning = true;
    saveToDB();
  }

  function pauseTimer() {
    if (!remoteState.timerRunning) return;
    remoteState.timerRunning = false;
    saveToDB();
  }

  function resetTimer() {
    remoteState.timerRunning = false;
    remoteState.timerSec = 0;
    document.getElementById('input-min').value = 0;
    document.getElementById('input-sec').value = 0;
    saveToDB();
  }

  function setManualTime() {
    const m = parseInt(document.getElementById('input-min').value)||0;
    const s = parseInt(document.getElementById('input-sec').value)||0;
    remoteState.timerSec = m*60 + Math.min(s,59);
    saveToDB();
  }

  function checkWinner() {
    const el = document.getElementById('winner-text');
    if (remoteState.scoreLeft === 3) {
      el.textContent = `🏆 ${dbTeams[teamLeft].name} 승리!`;
      if (!remoteState.winnerTriggered) {
        remoteState.winnerTriggered = true;
        showWinner(dbTeams[teamLeft].name, dbTeams[teamLeft].confetti);
      }
    } else if (remoteState.scoreRight === 3) {
      el.textContent = `🏆 ${dbTeams[teamRight].name} 승리!`;
      if (!remoteState.winnerTriggered) {
        remoteState.winnerTriggered = true;
        showWinner(dbTeams[teamRight].name, dbTeams[teamRight].confetti);
      }
    } else {
      el.textContent = '';
    }
  }

  function showWinner(name, colors, winnerCustomImg) {
      const overlay = document.getElementById('winner-overlay');
      const txt = document.getElementById('winner-text-big');
      const img = document.getElementById('winner-custom-img');

      if (winnerCustomImg) {
        img.src = winnerCustomImg;
        img.style.display = 'block';
      } else {
        img.style.display = 'none';
      }

      if (name === 'T1') {
        txt.textContent = '🏆 T1 브래킷 스테이지 진출!';
      } else {
        txt.textContent = '🏆 ' + name + ' WIN!';
      }
      overlay.classList.add('show');

      const duration = 10000;
      const animationEnd = Date.now() + duration;

      function randomInRange(min, max) { return Math.random() * (max - min) + min; }

      // 1. 양옆 대형 축포: 부드러운 곡선을 위해 gravity 낮추고 ticks(체공 시간) 늘림
      const cannonInterval = setInterval(function() {
        if (Date.now() > animationEnd) return clearInterval(cannonInterval);

        confetti({
          particleCount: 120, angle: 60, spread: 75, startVelocity: 80, gravity: 0.85, ticks: 300,
          origin: { x: -0.1, y: 1 }, colors: colors, zIndex: 99999
        });
        confetti({
          particleCount: 120, angle: 120, spread: 75, startVelocity: 80, gravity: 0.85, ticks: 300,
          origin: { x: 1.1, y: 1 }, colors: colors, zIndex: 99999
        });
      }, 1000); // 1초 주기로 여유 있게 펑!

      // 2. 메인 폭죽 & 눈송이: requestAnimationFrame 적용 (프레임 드랍 억제)
      let frameId;
      function frame() {
        if (Date.now() > animationEnd) return;

        // 화면 주사율에 맞춰 실행되므로 setInterval보다 압도적으로 부드러움
        // 매 프레임마다 터지면 렉걸리므로, 확률(약 3%~10%)을 주어 자연스럽게 터지게 유도
        
        // 사방에서 터지는 랜덤 불꽃
        if (Math.random() < 0.04) {
          confetti({
            particleCount: 60, startVelocity: 25, spread: 360, ticks: 200, gravity: 0.6, zIndex: 99999,
            colors: colors,
            origin: { x: randomInRange(0.1, 0.9), y: randomInRange(0.1, 0.4) }
          });
        }

        // 우아하게 떨어지는 금빛 눈송이 (천장에서 상시로 조금씩)
        if (Math.random() < 0.15) {
          confetti({
            particleCount: 2, startVelocity: 0, ticks: 400, gravity: 0.3, scale: 1.2,
            origin: { x: Math.random(), y: -0.1 },
            colors: ['#FFD700', '#ffffff'],
            drift: randomInRange(-0.8, 0.8),
            zIndex: 99999
          });
        }

        frameId = requestAnimationFrame(frame);
      }
      frame();

      setTimeout(() => { 
        overlay.classList.remove('show'); 
        cancelAnimationFrame(frameId); // 애니메이션 깔끔하게 종료
      }, 10500);
    }
  // 웅장하고 스무스한 원형 폭죽 우승 연출

  function resetAll() {
    if (!confirm('전체 초기화하시겠습니까?')) return;
    remoteState.scoreLeft = 0;
    remoteState.scoreRight = 0;
    remoteState.timerSec = 0;
    remoteState.timerRunning = false;
    remoteState.winnerTriggered = false;
    
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
    saveToDB();
  }
</script>
